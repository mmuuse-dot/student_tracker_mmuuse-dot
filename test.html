<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regex Validation Tests</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .pass {
            color: green;
            font-weight: bold;
        }

        .fail {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Regex Validation Tests</h1>

    <div id="results"></div>

    <script type="module">

    import { patterns } from "./validators.js";

    const tests = [

        {
            name: "Valid Amount",
            regex: patterns.amount,
            value: "12.50",
            expected: true
        },

        {
            name: "Invalid Amount",
            regex: patterns.amount,
            value: "abc",
            expected: false
        },

        {
            name: "Valid Date",
            regex: patterns.date,
            value: "2026-06-19",
            expected: true
        },

        {
            name: "Invalid Date",
            regex: patterns.date,
            value: "19/06/2026",
            expected: false
        },

        {
            name: "Valid Category",
            regex: patterns.category,
            value: "Food",
            expected: true
        },

        {
            name: "Invalid Category",
            regex: patterns.category,
            value: "Food123",
            expected: false
        },

        {
            name: "Valid Description",
            regex: patterns.description,
            value: "Lunch",
            expected: true
        },

        {
            name: "Invalid Description",
            regex: patterns.description,
            value: " lunch ",
            expected: false
        },

        {
            name: "Guaranteed Fail Test",
            regex: patterns.amount,
            value: "123",
            expected: false
        }

    ];

    const results = document.getElementById("results");

    tests.forEach(test => {

        const actual = test.regex.test(test.value);

        console.log(
            test.name,
            "Actual:", actual,
            "Expected:", test.expected
        );

        const passed = actual === test.expected;

        const p = document.createElement("p");

        p.className = passed ? "pass" : "fail";

        p.textContent =
            `${test.name}
            | Value: "${test.value}"
            | Actual: ${actual}
            | Expected: ${test.expected}
            | ${passed ? "PASS" : "FAIL"}`;

        results.appendChild(p);

    });

    </script>

</body>
</html>
