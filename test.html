<!DOCTYPE html>
<html>
<head>
    <title>Regex Tests</title>
</head>
<body>

<h1>Regex Validation Tests</h1>

<div id="results"></div>

<script type="module">

import { patterns } from "./validators.js";

const tests = [

{
    name:"Valid Amount",
    regex:patterns.amount,
    value:"12.50",
    expected:true
},

{
    name:"Invalid Amount",
    regex:patterns.amount,
    value:"abc",
    expected:false
},

{
    name:"Valid Date",
    regex:patterns.date,
    value:"2026-06-19",
    expected:true
},

{
    name:"Invalid Date",
    regex:patterns.date,
    value:"19/06/2026",
    expected:false
}

];

const results =
document.getElementById("results");

tests.forEach(test=>{

const actual =
test.regex.test(test.value);

const p =
document.createElement("p");

p.textContent =
`${test.name}: ${
actual === test.expected
? "PASS"
: "FAIL"
}`;

results.appendChild(p);

});

</script>

</body>
</html>
